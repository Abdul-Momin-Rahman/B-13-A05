<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />



    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>

    <header class="sticky top-0">
        <nav>
            <div class="navbar bg-base-100 shadow-sm px-2 lg:px-20 py-4">
                <div class="flex-1">
                    <a
                        class="flex justify-start items-center gap-2 text-xl md:text-2xl text-[#1F2937] font-semibold px-0"><img
                            class="w-9  " src="./assets/github-logo.png" alt=""><span class="hidden sm:flex">GitHub
                            Issues Tracker</span></a>
                </div>
                <div class="flex gap-4">
                    <label class="input">
                        <svg class="h-3 md:h-4 opacity-50 w-3 md:w-4" xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input id="input-search" type="search" class="w-15 md:w-full" placeholder="Search issues..." />
                    </label>
                    <button onclick="searchIssue()" class="btn  btn-primary text-xs md:text-base font-semibold text-white">Search</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="min-h-screen bg-[#F8FAFC]">

        <section class="w-full md:w-11/12 lg:w-9/12 mx-auto py-15">

            <!-- tabs -->
            <div class="p-2 lg:p-6 bg-white shadow-xs flex justify-center lg:justify-start gap-2 mb-4 rounded-xl">
                <button onclick="changingTabs(this)"
                    class="tabButton btn btn-primary px-3 py-2 font-semibold w-20 md:w-30">All</button>
                <button onclick="changingTabs(this)"
                    class="tabButton btn btn-outline px-3 py-2 font-semibold w-20 md:w-30">Open</button>
                <button onclick="changingTabs(this)"
                    class="tabButton btn btn-outline px-3 py-2 font-semibold w-20 md:w-30">Closed</button>
            </div>

            <!-- Below the tab -->
            <div class="bg-white p-2 lg:p-6 rounded-t-xl border-b border-gray-300 shadow-xl">

                <div class="flex justify-between">

                    <div class="flex justify-center items-center gap-2">

                        <div class="bg-[#ECE4FF] w-12 h-12 flex justify-center items-center rounded-full">
                            <div class="w-8">
                                <img src="./assets/Aperture.png" alt="">
                            </div>
                        </div>

                        <div>
                            <h1 class="text-sm md:text-xl text-[#1F2937] font-semibold"><span id="issue-count">50</span>
                                Issues
                            </h1>
                            <p class="text-[#64748B] text-xs md:text-base">Track and manage your project issues</p>
                        </div>

                    </div>

                    <div class="flex flex-col lg:flex-row justify-between gap-4">

                        <div class="flex gap-2 justify-center items-center">
                            <div class="bg-[#00A96E] rounded-full w-3 h-3"></div>
                            <p class="text-[#1F2937] text-sm md:text-base font-medium">Open</p>
                        </div>

                        <div class="flex gap-2 justify-center items-center">
                            <div class="bg-[#A855F7] rounded-full w-3 h-3"></div>
                            <p class="text-[#1F2937] text-sm md:text-base font-medium">Closed</p>
                        </div>

                    </div>

                </div>



            </div>

            <!-- all issues -->
            <div id="issues-container"
                class="p-2 lg:p-6 bg-[#FBFBFB] rounded-b-xl shadow-xl grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-2 md:gap-3 lg:gap-5">

                <!-- card will be here -->

            </div>


            <!-- Modal -->
            <!-- Open the modal using ID.showModal() method -->

            <dialog id="showAllInfo" class="modal modal-bottom sm:modal-middle">
                <div class="modal-box px-8 py- m-2 bg-white rounded-3xl " id="all-info-container">
                    <!-- Modal body will be here -->
                </div>
            </dialog>

        </section>

        <div id="spinner" class="flex justify-center">
            <span class="loading loading-ring loading-xs"></span>
            <span class="loading loading-ring loading-sm"></span>
            <span class="loading loading-ring loading-md"></span>
            <span class="loading loading-ring loading-lg"></span>
            <span class="loading loading-ring loading-xl"></span>
        </div>

    </main>


    <script src="./script.js"></script>
</body>

</html>
